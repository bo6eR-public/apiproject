apiVersion: apps/v1
kind: Deployment

metadata:
  name: my-app

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: my-app

  template:
    metadata:
      labels:
        app: my-app

    spec:
      containers:
        - name: my-app

          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080

          env:
            - name: ASPNETCORE_ENVIRONMENT
              value: "{{ .Values.env.ASPNETCORE_ENVIRONMENT }}"

            - name: ASPNETCORE_URLS
              value: "{{ .Values.env.ASPNETCORE_URLS }}"

            - name: ConnectionStrings__DefaultConnection
              value: "{{ .Values.database.connectionString }}"
