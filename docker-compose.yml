version: '3.8'

services:
  app:
    container_name: app
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      ConnectionStrings__DefaultConnection: "Host=host.docker.internal;Database=productsdb;Username=admin;Password=admin"
      ASPNETCORE_ENVIRONMENT: "Development"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/products"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: on-failure
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '1.0'
    networks:
      - internal_network

  db:
    image: postgres:16-alpine
    container_name: db
    hostname: database_host
    environment:
      POSTGRES_DB: productsdb
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d productsdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    expose:
      - "5432"
    networks:
      - internal_network
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus-api.yml:/etc/prometheus/prometheus.yml
      - ./prometheus-data:/prometheus
    networks:
      - internal_network
  node-exporter:
    image: prom/node-exporter
    container_name: node-exporter
    ports:
      - "9100:9100"
    restart: unless-stopped
    networks:
      - internal_network
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    restart: always
    volumes:
      - grafana-storage:/var/lib/grafana

  pushgateway:
    image: prom/pushgateway
    ports:
      - "9091:9091"
    restart: always
    networks:
      - internal_network

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
    networks:
      - internal_network
    ports:
      - "9200:9200"

  logstash:
    image: logstash:8.12.0
    container_name: logstash
    volumes:
      - ./logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
    ports:
      - "5044:5044"
    networks:
      - internal_network
    depends_on:
      - elasticsearch

  filebeat:
    image: elastic/filebeat:8.12.0
    container_name: filebeat
    user: root
    volumes:
      - ./filebeat.yml:/usr/share/filebeat/filebeat.yml
      - /var/log:/logs
      - /var/log:/var/log
    networks:
      - internal_network
    depends_on:
      - logstash
  kibana:
    image: kibana:8.12.0
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - internal_network

volumes:
  postgres_data:
  grafana-storage:
  kibana-data:

networks:
  internal_network:
    driver: bridge
